<link rel="stylesheet" href="/static/style.css">

<div class="container">

    <h2>👨‍💼 Admin Panel</h2>

    <a href="/admin-logout">
        <button class="btn">Logout</button>
    </a>

    <div class="table-box">

        <table>
            <tr>
                <th>No</th>
                <th>Name</th>
                <th>Action</th>
            </tr>

            {% for user in users %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ user }}</td>
                <td>
                    <a href="/delete_user/{{ user }}">
                        <button class="btn">Delete</button>
                    </a>
                </td>
            </tr>
            {% endfor %}

        </table>

    </div>

</div>
